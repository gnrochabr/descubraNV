<!DOCTYPE html>
<html lang="pt-BR" x-data="circuitApp()" x-init="start()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuitos | Turismo NV</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="../dados/controller.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        /* Transição suave para o efeito de hover nos cards */
        .ponto-card img { transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease; }
        .ponto-card:hover img { transform: scale(1.08); opacity: 0.9; }
    </style>
</head>
<body class="bg-black text-white h-screen flex flex-col overflow-hidden">
    
   <header class="p-4 flex justify-between items-center shadow-2xl z-50"
        style="
            background-image: 
            linear-gradient(rgba(15,81,50,0.95), rgba(15,81,50,0.95)),
            url('../imagens/leao/ouro.jpg');
            background-size: 60px;
            background-repeat: repeat;
        ">
        
    <button @click="window.location.href='../index.html'" 
            class="bg-white/10 px-5 py-2 rounded-full font-black text-xs uppercase hover:bg-[#ffc107] hover:text-[#0f5132] transition-all shadow-lg">
        ← VOLTAR
    </button>
    
    <h1 class="text-sm md:text-xl font-black uppercase italic tracking-tighter" 
        x-text="ready ? config.texts[lang].title : 'Carregando...'"></h1>
    
    <div class="flex gap-3">
        <button @click="setLang('pt')" :class="lang === 'pt'? 'scale-110' : 'opacity-60'"><span class="fi fi-br"></span></button>
        <button @click="setLang('en')" :class="lang === 'en'? 'scale-110' : 'opacity-60'"><span class="fi fi-us"></span></button>
        <button @click="setLang('es')" :class="lang === 'es'? 'scale-110' : 'opacity-60'"><span class="fi fi-es"></span></button>
    </div>
</header>

    <!-- MAIN ajustado para ocupar exatamente o restante da tela -->
    <main class="flex-1 overflow-hidden min-h-0" x-cloak x-show="ready">

        <!-- GRID para ≤ 3 cards -->
        <div x-show="pontos.length <= 3" class="h-full w-full grid gap-0"
             :class="pontos.length === 1 ? 'grid-cols-1' : pontos.length === 2 ? 'md:grid-cols-2 grid-cols-1' : 'md:grid-cols-3 grid-cols-1'">
            
            <template x-for="ponto in pontos" :key="ponto.id">
                <a :href="`local.html?id=${ponto.id}`" 
                   class="ponto-card relative flex-1 group overflow-hidden h-full">
                    
                    <img :src="ponto.hero" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/20"></div>
                    
                    <div class="relative h-full flex flex-col items-center justify-center p-8 text-center z-10">
                        <h2 class="font-black uppercase italic tracking-tighter mb-4 leading-none" 
                            :class="pontos.length === 1 ? 'text-5xl md:text-9xl' : 'text-3xl md:text-5xl'" 
                            x-text="ponto.texts[lang].title"></h2>
                        
                        <p class="opacity-90 font-light max-w-2xl mb-8"
                           :class="pontos.length === 1 ? 'text-xl md:text-3xl' : 'text-base md:text-xl'"
                           x-text="ponto.texts[lang].subtitle"></p>
                        
                        <div class="px-10 py-3 border-2 border-[#ffc107] text-[#ffc107] rounded-full font-black uppercase text-xs tracking-widest group-hover:bg-[#ffc107] group-hover:text-[#0f5132] transition-all shadow-2xl">
                            EXPLORAR LOCAL
                        </div>
                    </div>
                </a>
            </template>
        </div>

        <!-- SLIDER para > 3 cards -->
        <div x-show="pontos.length > 3" class="flex overflow-x-auto snap-x snap-mandatory gap-0 h-full">
            <template x-for="ponto in pontos" :key="ponto.id">
                <a :href="`local.html?id=${ponto.id}`"
                   class="ponto-card flex-none w-80 md:w-96 h-full relative group overflow-hidden snap-start">
                    
                    <img :src="ponto.hero" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/20"></div>
                    
                    <div class="relative h-full flex flex-col items-center justify-center p-8 text-center z-10">
                        <h2 class="font-black uppercase italic tracking-tighter mb-4 leading-none text-3xl md:text-5xl" 
                            x-text="ponto.texts[lang].title"></h2>
                        
                        <p class="opacity-90 font-light max-w-2xl mb-8 text-base md:text-xl"
                           x-text="ponto.texts[lang].subtitle"></p>
                        
                        <div class="px-10 py-3 border-2 border-[#ffc107] text-[#ffc107] rounded-full font-black uppercase text-xs tracking-widest group-hover:bg-[#ffc107] group-hover:text-[#0f5132] transition-all shadow-2xl">
                            EXPLORAR LOCAL
                        </div>
                    </div>
                </a>
            </template>
        </div>

    </main>

    <script>
        function circuitApp() {
            return {
                lang: localStorage.getItem('user_lang') || 'pt', 
                ready: false, 
                config: {}, 
                pontos: [],
                
                setLang(l) { 
                    this.lang = l; 
                    localStorage.setItem('user_lang', l); 
                },
                
                start() {
                    const load = () => {
                        const params = new URLSearchParams(window.location.search);
                        const id = params.get('id');
                        // Busca a configuração do circuito no controller.js
                        const data = window["CONFIG_" + (id?.toUpperCase())];
                        
                        if (data) {
                            this.config = data;
                            // Mapeia os IDs dos locais para os objetos de dados reais
                            this.pontos = data.locais.map(l => {
                                return window.LOCAIS[l] || window.LOCAIS[l.toLowerCase()];
                            }).filter(p => p); // Remove locais não encontrados
                            
                            this.ready = true;
                        }
                    };
                    
                    if (window.LOCAIS) load(); 
                    else window.addEventListener('locais-ready', load);
                }
            }
        }
    </script>
</body>
</html>
