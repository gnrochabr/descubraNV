<!DOCTYPE html>
<html lang="pt-BR" x-data="app()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <title>Gestão | Locais e Regiões</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="auth.js"></script>
</head>

<body class="bg-gray-100 p-6 md:p-10 font-sans">

<div class="max-w-7xl mx-auto space-y-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-black text-[#0f5132]">Gestão</h1>

        <div class="flex gap-2">
            <button @click="carregar()"
                class="bg-gray-200 px-4 py-2 rounded-xl text-sm font-bold hover:bg-gray-300">
                🔄 Atualizar
            </button>

            <button @click="rebuild()"
                class="bg-yellow-400 px-4 py-2 rounded-xl text-sm font-bold hover:opacity-90">
                ⚙️ Rebuild
            </button>
        </div>
    </div>

    <!-- TABS -->
    <div class="flex gap-2">
        <button @click="tab='locais'"
            :class="tab==='locais' ? 'bg-[#0f5132] text-white' : 'bg-white'"
            class="px-4 py-2 rounded-xl font-bold text-sm shadow">
            📍 Locais
        </button>

        <button @click="tab='regioes'"
            :class="tab==='regioes' ? 'bg-[#0f5132] text-white' : 'bg-white'"
            class="px-4 py-2 rounded-xl font-bold text-sm shadow">
            🗺️ Regiões
        </button>
    </div>

    <!-- BUSCA -->
    <input type="text" x-model="busca"
        placeholder="Buscar..."
        class="w-full p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#0f5132]">

    <!-- ===================== LOCAIS ===================== -->
    <div x-show="tab==='locais'" class="bg-white rounded-2xl shadow overflow-hidden">

        <table class="w-full text-sm">
            <thead class="bg-gray-50 text-left">
                <tr>
                    <th class="p-3">Nome</th>
                    <th class="p-3">Região</th>
                    <th class="p-3 text-right">Ações</th>
                </tr>
            </thead>

            <tbody>
                <template x-for="l in locaisFiltrados()" :key="l.id">
                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3 font-semibold" x-text="l.nome"></td>
                        <td class="p-3" x-text="l.regiao"></td>

                        <td class="p-3 text-right space-x-2">

                            <!-- EDITAR -->
                            <a :href="'alterar_local.html?id=' + l.id + '&regiao=' + l.regiao"
                                class="bg-blue-500 text-white px-3 py-1 rounded-lg text-xs">
                                Editar
                            </a>

                            <!-- FUTURO DELETE -->
                            <button @click="alert('Exclusão ainda não implementada')"
                                class="bg-red-500 text-white px-3 py-1 rounded-lg text-xs">
                                Excluir
                            </button>

                        </td>
                    </tr>
                </template>

                <tr x-show="locaisFiltrados().length === 0">
                    <td colspan="3" class="p-4 text-center text-gray-500">
                        Nenhum local encontrado
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ===================== REGIÕES ===================== -->
    <div x-show="tab==='regioes'" class="bg-white rounded-2xl shadow overflow-hidden">

        <table class="w-full text-sm">
            <thead class="bg-gray-50 text-left">
                <tr>
                    <th class="p-3">Nome</th>
                    <th class="p-3 text-right">Ações</th>
                </tr>
            </thead>

            <tbody>
                <template x-for="r in regioesFiltradas()" :key="r.id">
                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3 font-semibold" x-text="r.nome"></td>

                        <td class="p-3 text-right space-x-2">

                            <!-- EDITAR -->
                            <a :href="'alterar_regiao.html?id=' + r.id"
                                class="bg-blue-500 text-white px-3 py-1 rounded-lg text-xs">
                                Editar
                            </a>

                            <!-- FUTURO DELETE -->
                            <button @click="alert('Exclusão ainda não implementada')"
                                class="bg-red-500 text-white px-3 py-1 rounded-lg text-xs">
                                Excluir
                            </button>

                        </td>
                    </tr>
                </template>

                <tr x-show="regioesFiltradas().length === 0">
                    <td colspan="2" class="p-4 text-center text-gray-500">
                        Nenhuma região encontrada
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
function app() {
    return {
        tab: 'locais',
        busca: '',
        locais: [],
        regioes: [],

      async init() {
    const params = new URLSearchParams(window.location.search);

    const regiao = params.get('regiao');
    const local = params.get('id'); // ✅ corrigido aqui

    const res = await fetch(apiUrl('/api/locais'));
    const data = await res.json();
    this.locais = data.locais || [];

    if (regiao && local) {
        await this.carregarLocal(regiao, local);

        // opcional: já selecionar no dropdown automaticamente
        this.$nextTick(() => {
            const select = document.querySelector('select');
            if (select) {
                select.value = `${regiao}::${local}`;
            }
        });
    }
},

        async carregar() {
            try {
                const [locaisRes, regioesRes] = await Promise.all([
                    fetch(apiUrl('/api/locais')),
                    fetch(apiUrl('/api/regioes'))
                ]);

                const locaisData = await locaisRes.json();
                const regioesData = await regioesRes.json();

                this.locais = (locaisData.locais || []).map(l => ({
                    id: l.id || '',
                    nome: l.title || l.nome || l.id || '',
                    regiao: l.regiao || 'sem_regiao'
                }));

                this.regioes = (regioesData.regioes || []).map(r => ({
                    id: r.id || '',
                    nome: r.title|| r.nome || r.id || ''
                }));

            } catch (e) {
                console.error("Erro ao carregar:", e);
            }
        },

        locaisFiltrados() {
            return this.locais
                .filter(l =>
                    (l.nome || '').toLowerCase().includes(this.busca.toLowerCase())
                )
                .sort((a, b) =>
                    (a.nome || '').localeCompare(b.nome || '')
                );
        },

        regioesFiltradas() {
            return this.regioes
                .filter(r =>
                    (r.nome || '').toLowerCase().includes(this.busca.toLowerCase())
                )
                .sort((a, b) =>
                    (a.nome || '').localeCompare(b.nome || '')
                );
        },

        async rebuild() {
            const res = await fetch(apiUrl('/rebuild'), { method: 'POST' });
            const data = await res.json();
            alert(data.message || 'Rebuild executado');
        }
    }
}
</script>

</body>
</html>
